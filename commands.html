<!DOCTYPE html>
<html lang="zh-TW" data-theme="deepspace">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開發與伺服器指令集 | Edison.Dev</title>
  <meta name="description" content="Edison 的 Ubuntu SSH 連線、Docker 容器操作、Git 常用指令與 PyTorch API 指令集查詢手冊。">
  <link rel="stylesheet" href="src/style.css">
  <!-- 手機捷徑與 App 封面圖示 -->
  <link rel="apple-touch-icon" sizes="180x180" href="app_icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="app_icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="app_icon.png">

  <!-- CDN 載入 Prism.js 程式碼語法高亮 (指令說明可能需要) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</head>
<body>

  <!-- 動態流光背景 -->
  <div class="dynamic-bg"></div>
  <div class="grid-overlay"></div>

  <!-- 頂部導覽列 -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span>🌌 Edison.Dev</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">首頁</a></li>
      <li><a href="profile.html">個人經歷</a></li>
      <li><a href="ai-learning.html">AI 實驗室</a></li>
      <li><a href="hardware.html">硬體研究</a></li>
      <li><a href="commands.html" class="active">指令查詢</a></li>
    </ul>
    <button class="theme-toggle-btn" id="theme-toggle">
      🌌 Deep Space
    </button>
  </nav>

  <!-- 指令查詢主區塊 -->
  <main class="container">
    <header class="page-header">
      <h1 class="page-title">開發與伺服器指令集</h1>
      <p class="page-desc">
        本單元設計為仿真 Bash 終端機，方便複習並提供學弟妹快速上手指南。包含 Ubuntu SSH、Git 協作、Docker 環境隔離及 PyTorch API 常用指令。點擊綠色指令可直接模擬運行，或一鍵複製至剪貼簿。
      </p>
    </header>

    <div class="terminal-layout">
      <!-- 左側選單 -->
      <aside class="sidebar">
        <h3 class="sidebar-title">指令單元</h3>
        <ul class="sidebar-menu" id="cmd-sidebar-menu">
          <!-- 由 renderer.js 動態產生 -->
          <li class="sidebar-item">Loading...</li>
        </ul>
      </aside>

      <!-- 右側仿真終端機 -->
      <section class="terminal-simulator">
        <div class="terminal-header">
          <div class="terminal-buttons">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
          </div>
          <div class="terminal-title-text">lab_server - bash - 80x24</div>
          <div style="width: 50px;"></div> <!-- 佔位符以保持置中 -->
        </div>
        <div class="terminal-body" id="terminal-body">
          <!-- 由 renderer.js 動態渲染 -->
          <div class="terminal-input-line">
            <span class="terminal-prompt">user@lab:~$</span>
            <span class="terminal-text" style="color:var(--text-muted)">正在初始化系統指令庫，請稍候...</span>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script type="module">
    import { loadAndRenderCommands } from './src/renderer.js';
    window.addEventListener('DOMContentLoaded', loadAndRenderCommands);
  </script>
</body>
</html>
